<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Ticket Purchase</title>
    <link rel="shortcut icon" href="logo_2.jpg" type="image/x-icon">
    <link rel="stylesheet" href="airbus.css">
</head>

<body>
    <header>
        <div class="class_1">
            <h1>Enjoy The Travel</h1>
        </div>
    </header>
    <main>
        <div class="container">

            <div class="img">
                <img src="pic_2.jpg" alt="pic_2">
            </div>
            <div class="buy_ticket">
                <form action="post" method="post">
                    <div class="field_1">
                        <label for="name">Name</label>
                        <input type="text" name="username" id="name" placeholder="Enter Your Full Name Please" autofocus
                            required>
                    </div>
                    <div class="field_2">
                        <label for="mobile">Contact Number </label>
                        <input type="tel" name="contact number" id="mobile" placeholder="Enter Your Mobile Number"
                            required>
                    </div>
                    <div class="field">
                        <label for="mail">Email</label>
                        <input type="email" name="mail_adress" id="mail" pattern="example@host.com"
                            placeholder="Enter Your Email Adress Please">
                    </div>
                    <div class="field_4">
                        <label for="starting">Select Where From You Start Travell </label>
                        <input type="text" name="starting_airport" id="starting" required
                            placeholder="Select Your Location">
                    </div>
                    <div class="field_5">
                        <label for="destination">Destination</label>
                        <input type="text" name="landind" id="destination" placeholder="Where you will land Select"
                            required>
                    </div>
                    <div class="field_6">
                        <label for="date">Select Date</label>
                        <input type="date" name="datetime" id="date" required>
                    </div>
                    <div class="field_7">
                        <input type="button" value="Search for plane">
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer></footer>
</body>

</html>
