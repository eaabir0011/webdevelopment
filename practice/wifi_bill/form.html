<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Your Bill</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <header>
        <div class="class1">
            <img src="" alt="" srcset="">
            <span>
                <h1>Bangladesh Cyber Internet Authority</h1>
            </span>
        </div>
    </header>
    <main>
        <div class="class1">
            <h2>Pay Your Wifi Bill </h2>
        </div>
        <div class="form">
            <form action="post">
                <div id="name">
                   <label for="name">Your Name</label>
                   <input type="text" name="name" id="name" placeholder="Give Your Name" autofocus required>
                </div>
                <div id="mobile">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" name="mobile" id="mobile" required placeholder="Give Your Mobile Number">
                </div>
                <div id="email">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="Give Your Email Address">
                </div>
                <div id="month">
                    <label for="month">Select Your Month </label>
                    <select name="month" id="month">
                        <option value="choose_the_option" selected>Choose The Option </option>
                        <option value="Jan">January</option>
                        <option value="Feb">February</option>
                        <option value="Mar">March</option>
                        <option value="Apr">April</option>
                        <option value="May">May</option>
                        <option value="Jun">June</option>
                        <option value="Jul">July</option>
                        <option value="Aug">August</option>
                        <option value="Sep">September</option>
                        <option value="Oct">October</option>
                        <option value="Nov">November</option>
                        <option value="Dec">December</option>
                    </select>
                </div>
                <div id="userid">
                    <label for="userid">User ID</label>
                    <input type="text" name="userid" id="userid" required placeholder="Give Your User ID ">
                </div>
                

            </form>
        </div>
    </main>
    <footer>
        <div class="class1">
            <h2>Contact With US</h2>
        </div>
    </footer>
</body>
</html>
